<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>KAIZEN · Policía Municipal de Madrid</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Barlow+Semi+Condensed:wght@600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root{
    --bg:#EDF1FB; --card:#FFFFFF; --ink:#0F1A33; --inkSoft:#697693; --line:#E3E9F6;
    --blue:#2E5BFF; --indigo:#5B43E8; --blueDeep:#1E3A8A; --blueSoft:#E8EDFF;
    --ok:#10B981; --okText:#0B8157; --okFill:#E6F8F1; --okBorder:#B5EAD4; --okGlow:rgba(16,185,129,.30);
    --noText:#D72648; --noFill:#FEEBEF; --noBorder:#F7C9D2;
    --disp:'Barlow Semi Condensed',system-ui,sans-serif;
    --body:'Plus Jakarta Sans',system-ui,sans-serif;
    --shadow:0 2px 4px rgba(15,26,51,.04), 0 10px 26px rgba(15,26,51,.07);
    --shadowHover:0 6px 12px rgba(46,91,255,.10), 0 16px 36px rgba(46,91,255,.16);
  }
  *{box-sizing:border-box;}
  body{margin:0; background:var(--bg); color:var(--ink); font-family:var(--body); -webkit-font-smoothing:antialiased;
    background-image:radial-gradient(1200px 500px at 50% -200px, rgba(46,91,255,.10), transparent 70%);}
  .wrap{max-width:600px; margin:0 auto; padding:0 0 70px;}
  .pad{padding:0 18px;}
  /* Banda superior tipo placa */
  .topbar{background:linear-gradient(135deg,#1E40AF 0%, #2E5BFF 55%, #5B43E8 120%); padding:20px 22px; display:flex; align-items:center; gap:14px; color:#fff; position:relative; overflow:hidden;}
  .topbar::after{content:""; position:absolute; right:-40px; top:-60px; width:180px; height:180px; border-radius:50%; background:rgba(255,255,255,.10);}
  .checker{height:10px; background:repeating-conic-gradient(rgba(255,255,255,.92) 0% 25%, var(--blue) 0% 50%) 0 0 / 10px 10px; margin-bottom:30px;}
  .brand{font-family:var(--disp); font-weight:800; font-size:24px; letter-spacing:2.5px; line-height:1;}
  .brand-sub{font-size:10.5px; color:rgba(255,255,255,.88); letter-spacing:1.4px; margin-top:4px; font-weight:600;}
  h1.title{font-family:var(--disp); font-size:38px; font-weight:700; line-height:1.02; margin:0 0 8px;
    background:linear-gradient(120deg,#1E3A8A,#2E5BFF 60%,#5B43E8); -webkit-background-clip:text; background-clip:text; color:transparent;}
  .lead{color:var(--inkSoft); font-size:15px; margin:0; line-height:1.5;}
  .card{display:flex; align-items:center; gap:15px; width:100%; text-align:left; padding:18px; border-radius:18px; border:1px solid var(--line); background:var(--card); cursor:pointer; box-shadow:var(--shadow); transition:transform .18s cubic-bezier(.2,.7,.2,1), box-shadow .2s, border-color .2s;}
  .card:hover{border-color:transparent; transform:translateY(-3px); box-shadow:var(--shadowHover);}
  .card:active{transform:translateY(-1px) scale(.995);}
  .ico{flex-shrink:0; width:48px; height:48px; border-radius:14px; background:linear-gradient(135deg,var(--blueSoft),#EEF0FF); display:flex; align-items:center; justify-content:center;}
  .ico svg{stroke:var(--blue); fill:none; stroke-width:1.8; stroke-linecap:round; stroke-linejoin:round;}
  .card .t{font-size:17px; font-weight:700;}
  .card .d{font-size:13px; color:var(--inkSoft); margin-top:2px;}
  .arrow{color:var(--blue); font-size:18px; transition:transform .2s;}
  .card:hover .arrow{transform:translateX(3px);}
  .stack{display:flex; flex-direction:column; gap:12px;}
  .back{background:none; border:none; color:var(--inkSoft); cursor:pointer; font-size:14px; font-weight:600; padding:0; margin-bottom:22px; font-family:var(--body);}
  .h2{font-family:var(--disp); font-size:31px; font-weight:700; margin:0 0 6px;}
  .sub{color:var(--inkSoft); font-size:14px; margin:0 0 26px;}
  .temaBtn{display:flex; align-items:center; gap:13px; width:100%; text-align:left; padding:15px 16px; border-radius:14px; border:1.5px solid var(--line); background:var(--card); cursor:pointer; transition:all .18s; font-family:var(--body); box-shadow:var(--shadow);}
  .temaBtn.on{border-color:var(--blue); background:var(--blueSoft); box-shadow:0 6px 16px rgba(46,91,255,.14);}
  .temaBtn:active{transform:scale(.99);}
  .chk{width:23px; height:23px; border-radius:8px; border:2px solid var(--line); display:flex; align-items:center; justify-content:center; color:#fff; font-size:13px; flex-shrink:0; transition:all .18s;}
  .temaBtn.on .chk{background:linear-gradient(135deg,var(--blue),var(--indigo)); border-color:transparent;}
  .temaBtn .name{font-size:16px; font-weight:600;}
  .pill{padding:11px 22px; border-radius:99px; border:1.5px solid var(--line); background:var(--card); color:var(--ink); font-size:15px; font-weight:600; cursor:pointer; font-family:var(--body); transition:all .15s;}
  .pill.on{border-color:transparent; background:linear-gradient(135deg,var(--blue),var(--indigo)); color:#fff; box-shadow:0 6px 14px rgba(46,91,255,.30);}
  .pill:active{transform:scale(.96);}
  .primary{width:100%; padding:16px; border-radius:15px; border:none; background:linear-gradient(135deg,var(--blue),var(--indigo)); color:#fff; font-size:16px; font-weight:700; cursor:pointer; font-family:var(--body); box-shadow:0 8px 20px rgba(46,91,255,.30); transition:transform .12s, box-shadow .2s, filter .2s;}
  .primary:hover{filter:brightness(1.06); box-shadow:0 10px 26px rgba(46,91,255,.38);}
  .primary:active{transform:translateY(1px) scale(.99);}
  .primary:disabled{background:var(--line); color:#A7B0C6; box-shadow:none; cursor:default;}
  .ghost{padding:14px 30px; border-radius:15px; border:1.5px solid var(--line); background:var(--card); color:var(--ink); font-size:16px; font-weight:700; cursor:pointer; font-family:var(--body); box-shadow:var(--shadow); transition:all .15s;}
  .ghost:active{transform:scale(.98);}
  .tag{display:inline-block; font-family:var(--disp); color:var(--blue); font-size:14.5px; font-weight:700; letter-spacing:.6px; margin-bottom:14px; text-transform:uppercase;}
  .q{font-size:22px; line-height:1.42; font-weight:700; margin:0 0 26px;}
  .opt{width:100%; text-align:left; padding:16px; border-radius:16px; border:1.5px solid var(--line); background:var(--card); color:var(--ink); font-size:16px; font-weight:500; cursor:pointer; transition:transform .15s, box-shadow .2s, background .25s, border-color .25s, color .25s; display:flex; align-items:center; gap:13px; font-family:var(--body); box-shadow:var(--shadow);}
  .opt:not([disabled]):hover{transform:translateY(-2px); box-shadow:var(--shadowHover); border-color:#C9D4F2;}
  .opt:not([disabled]):active{transform:scale(.99);}
  .opt[disabled]{cursor:default;}
  .opt.pending{background:#1B2542; border-color:#1B2542; color:#fff; box-shadow:0 8px 20px rgba(27,37,66,.3); animation:pulseSel .6s ease-out;}
  .opt.dim55{opacity:.5;}
  .opt.dim{opacity:.4;}
  .opt.ok{background:var(--okFill); border-color:var(--okBorder); color:var(--okText); box-shadow:0 10px 26px var(--okGlow); animation:pop .42s cubic-bezier(.2,.8,.2,1);}
  .opt.no{background:var(--noFill); border-color:var(--noBorder); color:var(--noText); animation:shake .42s ease;}
  .badge2{flex-shrink:0; width:28px; height:28px; border-radius:9px; background:var(--bg); color:var(--inkSoft); border:1px solid var(--line); display:flex; align-items:center; justify-content:center; font-size:13px; font-weight:700;}
  .opt.pending .badge2{background:#fff; color:#1B2542; border-color:#fff;}
  .opt.ok .badge2{background:var(--ok); color:#fff; border-color:var(--ok);}
  .opt.no .badge2{background:var(--noText); color:#fff; border-color:var(--noText);}
  .ck{width:15px; height:15px; stroke:#fff; fill:none; stroke-width:3; stroke-linecap:round; stroke-linejoin:round;}
  .ck path{stroke-dasharray:24; stroke-dashoffset:24; animation:drawck .35s .06s ease forwards;}
  .feedback{margin-top:24px; animation:qin .3s ease;}
  .fb-txt{margin:0 0 6px; font-size:15px; font-weight:700;}
  .fb-exp{margin:0 0 16px; font-size:14px; color:var(--inkSoft); line-height:1.5;}
  .ring-wrap{display:flex; justify-content:center; margin-bottom:22px;}
  .meta{display:flex; align-items:center; justify-content:space-between; margin-bottom:24px;}
  .meta .small{font-size:13px; color:var(--inkSoft);}
  .meta .big{font-size:18px; font-weight:800; margin-top:2px;}
  .center{text-align:center;}
  .muted{color:var(--inkSoft); font-size:13px;}
  .empty{padding:40px 18px; text-align:center; color:var(--inkSoft); border:1.5px dashed var(--line); border-radius:16px; background:var(--card);}
  .view{animation:qin .32s cubic-bezier(.2,.7,.2,1);}
  .confetti{position:fixed; inset:0; pointer-events:none; z-index:60;}
  .confetti span{position:fixed; width:9px; height:9px; border-radius:2px; opacity:1; transition:transform .8s cubic-bezier(.15,.7,.2,1), opacity .8s ease;}
  @keyframes qin{from{opacity:0; transform:translateY(14px);} to{opacity:1; transform:none;}}
  @keyframes pop{0%{transform:scale(1);}45%{transform:scale(1.04);}100%{transform:scale(1);}}
  @keyframes shake{0%,100%{transform:translateX(0);}20%{transform:translateX(-6px);}40%{transform:translateX(6px);}60%{transform:translateX(-4px);}80%{transform:translateX(4px);}}
  @keyframes pulseSel{0%{box-shadow:0 0 0 0 rgba(46,91,255,0);}35%{box-shadow:0 0 0 6px rgba(46,91,255,.18);}100%{box-shadow:0 0 0 0 rgba(46,91,255,0);}}
  @keyframes drawck{to{stroke-dashoffset:0;}}
  @media (prefers-reduced-motion: reduce){*{animation:none!important; transition:none!important;}}
</style>
</head>
<body>
  <div class="wrap">
    <div class="topbar">
      <svg width="44" height="44" viewBox="0 0 24 24" aria-hidden="true">
        <path d="M12 2 L21 5 V11 C21 16.5 17 20.6 12 22.6 C7 20.6 3 16.5 3 11 V5 Z" fill="#fff"/>
        <text x="12" y="15.7" text-anchor="middle" font-size="11" font-weight="800" fill="#2E5BFF" font-family="Barlow Semi Condensed, sans-serif">K</text>
      </svg>
      <div>
        <div class="brand">KAIZEN</div>
        <div class="brand-sub">POLICÍA MUNICIPAL · MADRID</div>
      </div>
    </div>
    <div class="checker"></div>
    <div class="pad"><div id="app"></div></div>
  </div>

<script>
// ====== CONEXIÓN CON TU ALMACÉN (Supabase) ======
const SUPABASE_URL = "https://bsijdcsruldswsubaieu.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJzaWpkY3NydWxkc3dzdWJhaWV1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI0NTgzMTQsImV4cCI6MjA5ODAzNDMxNH0.dcEx8m8JHTxhLxqqnBJoIibjPMxchORRkJqc4I5UjOg";
const supa = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const LETRAS = ["A","B","C","D"];
const ESPERA = 400;
const REDUCE = window.matchMedia && window.matchMedia("(prefers-reduced-motion: reduce)").matches;
const ICONS = {
  temario:'<rect x="5" y="3" width="14" height="18" rx="2.5"/><path d="M9 3v2.5h6V3"/><path d="M9 11h6M9 15h4"/>',
  estudio:'<path d="M20 8a8 8 0 0 0-14-3.5M20 4v4h-4"/><path d="M4 16a8 8 0 0 0 14 3.5M4 20v-4h4"/>',
  simulacro:'<circle cx="12" cy="14" r="7"/><path d="M12 14V10M10 2.5h4M18.5 6l-1.3 1.3"/>',
  pagina:'<path d="M7 3h7l4 4v14H7z"/><path d="M14 3v4h4"/><path d="M10 13h5M10 17h5"/>'
};
const svg = (n)=>`<svg width="23" height="23" viewBox="0 0 24 24">${ICONS[n]}</svg>`;
const CK = `<svg class="ck" viewBox="0 0 24 24"><path d="M5 13l4 4L19 7"/></svg>`;
const fmt = (s)=>`${Math.floor(s/60)}:${String(s%60).padStart(2,"0")}`;
const baraja = (a)=>{const x=[...a];for(let i=x.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[x[i],x[j]]=[x[j],x[i]];}return x;};
const esc = (t)=>String(t).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));

function confeti(){
  if(REDUCE) return;
  const colors=['#2E5BFF','#10B981','#5B43E8','#F59E0B','#F43F5E','#22D3EE'];
  const host=document.createElement('div'); host.className='confetti'; document.body.appendChild(host);
  const cx=window.innerWidth/2, cy=window.innerHeight*0.36;
  for(let k=0;k<18;k++){
    const s=document.createElement('span');
    s.style.left=cx+'px'; s.style.top=cy+'px'; s.style.background=colors[k%colors.length];
    host.appendChild(s);
    const ang=Math.random()*Math.PI*2, dist=70+Math.random()*110;
    requestAnimationFrame(()=>{ s.style.transform=`translate(${Math.cos(ang)*dist}px, ${Math.sin(ang)*dist+50}px) rotate(${Math.random()*420}deg)`; s.style.opacity='0'; });
  }
  setTimeout(()=>host.remove(),900);
}

function ring(size,progress,width,inner,fgId){
  const r=(size-width*2)/2, c=2*Math.PI*r, off=c-c*Math.max(0.02,progress);
  const id = fgId?`id="${fgId}"`:"";
  return `<div style="position:relative;width:${size}px;height:${size}px">
    <svg width="${size}" height="${size}" style="transform:rotate(-90deg)">
      <circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="var(--line)" stroke-width="${width}"/>
      <circle ${id} cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="url(#grad)" stroke-width="${width}" stroke-linecap="round" stroke-dasharray="${c}" stroke-dashoffset="${off}" style="transition:stroke-dashoffset .7s cubic-bezier(.3,.8,.2,1)"/>
      <defs><linearGradient id="grad" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#2E5BFF"/><stop offset="1" stop-color="#5B43E8"/></linearGradient></defs>
    </svg>
    <div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center">${inner}</div>
  </div>`;
}

// ====== ESTADO ======
let TEMAS=[], PREGUNTAS=[];
let vista="inicio", modoConfig="temario", selTemas=new Set(), numPreg=10;
let preguntas=[], titulo="", esSimulacro=false, indice=0, elegida=null, pendiente=null, aciertos=0, segundos=0, timer=null;
let estActual=null, estPool=[], estElegida=null, estPendiente=null, estCount=0;

const app = ()=>document.getElementById("app");
function go(v){ stopTimer(); vista=v; render(); }

function poolDe(set){
  const map=Object.fromEntries(TEMAS.map(t=>[t.id,t.nombre]));
  return PREGUNTAS.filter(p=>set.has(p.tema_id)).map(p=>({...p, tema:map[p.tema_id]}));
}
function todas(){
  const map=Object.fromEntries(TEMAS.map(t=>[t.id,t.nombre]));
  return PREGUNTAS.map(p=>({...p, tema:map[p.tema_id]}));
}

function startTimer(){
  stopTimer();
  timer=setInterval(()=>{ segundos++; const e=document.getElementById("cron"); if(e) e.textContent="⏱ "+fmt(segundos); else stopTimer(); },1000);
}
function stopTimer(){ if(timer){clearInterval(timer); timer=null;} }

// ====== ACCIONES ======
function abrirConfig(m){ modoConfig=m; selTemas=new Set(TEMAS.map(t=>t.id)); go("config"); }
function comenzarTemario(){
  const pool=baraja(poolDe(selTemas));
  const n = numPreg==="todas" ? pool.length : Math.min(numPreg,pool.length);
  preguntas=pool.slice(0,n); titulo="Test de temario"; esSimulacro=false;
  indice=0; elegida=null; pendiente=null; aciertos=0; segundos=0; go("test");
}
function comenzarSimulacro(){
  preguntas=baraja(todas()); titulo="Simulacro"; esSimulacro=true;
  indice=0; elegida=null; pendiente=null; aciertos=0; segundos=0; go("test"); startTimer();
}
function comenzarEstudio(){
  estPool=poolDe(selTemas); estCount=0; estElegida=null; estPendiente=null;
  estActual=estPool[Math.floor(Math.random()*estPool.length)]; go("estudio");
}
function siguienteEstudio(){
  let n=estPool[Math.floor(Math.random()*estPool.length)];
  if(estPool.length>1){ while(n===estActual) n=estPool[Math.floor(Math.random()*estPool.length)]; }
  estActual=n; estElegida=null; estPendiente=null; estCount++; render();
}
function elegir(i){
  if(elegida!==null||pendiente!==null) return;
  pendiente=i; render();
  setTimeout(()=>{ elegida=i; const ok=(i===preguntas[indice].correcta); if(ok) aciertos++; pendiente=null; render(); if(ok) confeti(); }, ESPERA);
}
function siguiente(){
  if(indice+1<preguntas.length){ indice++; elegida=null; pendiente=null; render(); }
  else go("resultados");
}
function elegirEstudio(i){
  if(estElegida!==null||estPendiente!==null) return;
  estPendiente=i; render();
  setTimeout(()=>{ estElegida=i; const ok=(i===estActual.correcta); estPendiente=null; render(); if(ok) confeti(); }, ESPERA);
}

// ====== RENDER ======
function optionHTML(texto,i,correcta,elegidaI,fase){
  let cls="opt", inner=LETRAS[i];
  if(fase==="pending"){ if(i===elegidaI) cls+=" pending"; else cls+=" dim55"; }
  else if(fase==="reveal"){
    if(i===correcta){ cls+=" ok"; inner=CK; }
    else if(i===elegidaI){ cls+=" no"; inner="✕"; }
    else cls+=" dim";
  }
  const dis = fase!=="idle" ? "disabled" : "";
  return `<button class="${cls}" ${dis} data-opt="${i}"><span class="badge2">${inner}</span><span style="flex:1">${esc(texto)}</span></button>`;
}

function render(){
  const A=app();

  if(vista==="cargando"){ A.innerHTML=`<div class="empty">Cargando KAIZEN…</div>`; return; }
  if(vista==="error"){ A.innerHTML=`<div class="empty">No se pudo conectar con la base de datos.<br>Revisa la conexión e inténtalo de nuevo.</div>`; return; }

  if(vista==="inicio"){
    const items=[
      {ic:"temario",t:"Test de temario",d:"Elige temas y nº de preguntas",a:"cfg-temario"},
      {ic:"estudio",t:"Estudio",d:"Elige una respuesta y comprueba al momento, sin límite",a:"cfg-estudio"},
      {ic:"simulacro",t:"Simulacro",d:"Examen completo cronometrado",a:"simulacro"},
      {ic:"pagina",t:"Una página",d:"Resúmenes en PDF de lo más preguntable",a:"unapagina"},
    ];
    A.innerHTML=`<div class="view">
      <div style="margin-bottom:34px">
        <h1 class="title">Mejora cada día.</h1>
        <p class="lead">Tu plaza se construye paso a paso. Elige por dónde seguir hoy.</p>
      </div>
      <div class="stack">
        ${items.map(it=>`<button class="card" data-go="${it.a}">
          <span class="ico">${svg(it.ic)}</span>
          <span style="flex:1"><span class="t" style="display:block">${it.t}</span><span class="d" style="display:block">${it.d}</span></span>
          <span class="arrow">→</span></button>`).join("")}
      </div></div>`;
    A.querySelectorAll("[data-go]").forEach(b=>b.onclick=()=>{
      const a=b.dataset.go;
      if(a==="cfg-temario") abrirConfig("temario");
      else if(a==="cfg-estudio") abrirConfig("estudio");
      else if(a==="simulacro") comenzarSimulacro();
      else if(a==="unapagina") go("unapagina");
    });
    return;
  }

  if(vista==="config"){
    A.innerHTML=`<div class="view">
      <button class="back" data-back>← Volver</button>
      <h2 class="h2">${modoConfig==="temario"?"Test de temario":"Estudio"}</h2>
      <p class="sub">Selecciona los temas que quieres incluir.</p>
      <div class="stack" style="margin-bottom:28px">
        ${TEMAS.map(t=>`<button class="temaBtn ${selTemas.has(t.id)?'on':''}" data-tema="${t.id}">
          <span class="chk">${selTemas.has(t.id)?'✓':''}</span><span class="name">${esc(t.nombre)}</span></button>`).join("")}
      </div>
      ${modoConfig==="temario"?`
      <div style="margin-bottom:28px">
        <div style="font-size:13px;font-weight:700;color:var(--inkSoft);margin-bottom:11px;letter-spacing:.3px">NÚMERO DE PREGUNTAS</div>
        <div style="display:flex;gap:9px;flex-wrap:wrap">
          ${[5,10,20,"todas"].map(n=>`<button class="pill ${numPreg===n?'on':''}" data-num="${n}">${n==="todas"?"Todas":n}</button>`).join("")}
        </div>
      </div>`:""}
      <button class="primary" data-start ${selTemas.size===0?"disabled":""}>${modoConfig==="temario"?"Comenzar test":"Empezar a estudiar"}</button>
    </div>`;
    A.querySelector("[data-back]").onclick=()=>go("inicio");
    A.querySelectorAll("[data-tema]").forEach(b=>b.onclick=()=>{
      const id=Number(b.dataset.tema);
      selTemas.has(id)?selTemas.delete(id):selTemas.add(id); render();
    });
    A.querySelectorAll("[data-num]").forEach(b=>b.onclick=()=>{ const v=b.dataset.num; numPreg=v==="todas"?"todas":Number(v); render(); });
    const start=A.querySelector("[data-start]");
    if(start) start.onclick=()=> modoConfig==="temario"?comenzarTemario():comenzarEstudio();
    return;
  }

  if(vista==="test"){
    const actual=preguntas[indice]; const locked=elegida!==null;
    const fase = elegida!==null?"reveal":(pendiente!==null?"pending":"idle");
    const elegidaI = pendiente!==null?pendiente:elegida;
    const prog=(locked?indice+1:indice)/preguntas.length;
    A.innerHTML=`<div class="view">
      <div class="meta">
        <div>
          <div class="small">Pregunta ${indice+1} de ${preguntas.length}</div>
          <div class="big" id="cron">${esSimulacro?("⏱ "+fmt(segundos)):(aciertos+" "+(aciertos===1?"acierto":"aciertos"))}</div>
        </div>
        ${ring(58,prog,5,`<span style="font-size:13px;font-weight:800;color:var(--blue)">${Math.round(prog*100)}%</span>`)}
      </div>
      <span class="tag">${esc(actual.tema||titulo)}</span>
      <h1 class="q">${esc(actual.enunciado)}</h1>
      <div class="stack">
        ${[actual.opcion_a,actual.opcion_b,actual.opcion_c,actual.opcion_d].map((op,i)=>optionHTML(op,i,actual.correcta,elegidaI,fase)).join("")}
      </div>
      ${locked?`<div class="feedback">
        <p class="fb-txt" style="color:${elegida===actual.correcta?'var(--okText)':'var(--noText)'}">${elegida===actual.correcta?"¡Correcto! Bien hecho.":"No es correcta. La buena está en verde."}</p>
        ${actual.explicacion?`<p class="fb-exp">${esc(actual.explicacion)}</p>`:""}
        <button class="primary" data-next>${indice+1<preguntas.length?"Siguiente":"Ver resultados"}</button>
      </div>`:""}
    </div>`;
    A.querySelectorAll("[data-opt]").forEach(b=>b.onclick=()=>elegir(Number(b.dataset.opt)));
    const nx=A.querySelector("[data-next]"); if(nx) nx.onclick=siguiente;
    return;
  }

  if(vista==="estudio"){
    const a=estActual; const revelado=estElegida!==null;
    const fase = estElegida!==null?"reveal":(estPendiente!==null?"pending":"idle");
    const elegidaI = estPendiente!==null?estPendiente:estElegida;
    A.innerHTML=`<div class="view">
      <button class="back" data-back>← Volver</button>
      <div style="display:flex;justify-content:space-between;font-size:13px;color:var(--inkSoft);margin-bottom:18px">
        <span>Modo estudio · repaso</span><span>${estCount} repasadas</span>
      </div>
      <span class="tag">${esc(a.tema)}</span>
      <h1 class="q">${esc(a.enunciado)}</h1>
      <div class="stack">
        ${[a.opcion_a,a.opcion_b,a.opcion_c,a.opcion_d].map((op,i)=>optionHTML(op,i,a.correcta,elegidaI,fase)).join("")}
      </div>
      ${revelado?`<div class="feedback">
        <p class="fb-txt" style="color:${estElegida===a.correcta?'var(--okText)':'var(--noText)'}">${estElegida===a.correcta?"¡Correcto! Bien hecho.":"No es correcta. La buena está en verde."}</p>
        ${a.explicacion?`<p class="fb-exp">${esc(a.explicacion)}</p>`:""}
        <button class="primary" data-nextest>Siguiente pregunta</button>
      </div>`:""}
    </div>`;
    A.querySelector("[data-back]").onclick=()=>go("inicio");
    A.querySelectorAll("[data-opt]").forEach(b=>b.onclick=()=>elegirEstudio(Number(b.dataset.opt)));
    const ne=A.querySelector("[data-nextest]"); if(ne) ne.onclick=siguienteEstudio;
    return;
  }

  if(vista==="unapagina"){
    A.innerHTML=`<div class="view">
      <button class="back" data-back>← Volver</button>
      <h2 class="h2">Una página</h2>
      <p class="sub">Lo más preguntable, resumido en una sola hoja. Descárgalo como apoyo de estudio.</p>
      <div class="empty">Aún no hay fichas. Pronto podrás subir aquí tus resúmenes en PDF desde el panel.</div>
    </div>`;
    A.querySelector("[data-back]").onclick=()=>go("inicio");
    return;
  }

  if(vista==="resultados"){
    const total=preguntas.length, r=(150-14)/2, c=2*Math.PI*r, off=c-c*Math.max(0.02,aciertos/total);
    A.innerHTML=`<div class="view center" style="padding-top:16px">
      <div class="muted" style="margin-bottom:24px">${esc(titulo)} · completado</div>
      <div class="ring-wrap">${ring(150,0,7,`<div style="font-size:42px;font-weight:800;line-height:1"><span id="scoreNum">0</span><span style="color:var(--inkSoft);font-size:20px">/${total}</span></div>`,"ringfg")}</div>
      ${esSimulacro?`<div class="muted" style="font-size:15px;margin-bottom:6px">Tiempo: ${fmt(segundos)}</div>`:""}
      <p style="font-size:18px;font-weight:700;margin:10px 0 32px">${aciertos===total?"¡Perfecto! Todas correctas.":aciertos>=total/2?"Un paso más cerca de tu plaza.":"Cada repaso suma. Sigue."}</p>
      <button class="ghost" data-home>Volver al inicio</button>
    </div>`;
    A.querySelector("[data-home]").onclick=()=>go("inicio");
    // animaciones: anillo + cuenta atrás del marcador + confeti si buen resultado
    const fg=document.getElementById("ringfg");
    if(fg) requestAnimationFrame(()=>{ fg.style.strokeDashoffset = off; });
    const span=document.getElementById("scoreNum");
    if(span && !REDUCE){ const t0=performance.now(); const step=(now)=>{ const k=Math.min(1,(now-t0)/700); span.textContent=Math.round(k*aciertos); if(k<1) requestAnimationFrame(step); }; requestAnimationFrame(step); }
    else if(span){ span.textContent=aciertos; }
    if(aciertos>=Math.max(1,total/2)) setTimeout(confeti,250);
    return;
  }
}

// ====== ARRANQUE: traer datos del almacén ======
async function init(){
  vista="cargando"; render();
  try{
    const [t,p] = await Promise.all([
      supa.from("temas").select("*").order("id"),
      supa.from("preguntas").select("*")
    ]);
    if(t.error||p.error) throw (t.error||p.error);
    TEMAS = t.data||[];
    PREGUNTAS = p.data||[];
    selTemas = new Set(TEMAS.map(x=>x.id));
    go("inicio");
  }catch(e){
    console.error(e);
    vista="error"; render();
  }
}
init();
</script>
</body>
</html>
