<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>KAIZEN · Policía Municipal de Madrid</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root{
    --bg:#F6F8F7; --card:#FFFFFF; --ink:#1A241E; --inkSoft:#69736C; --line:#E6EAE7; --sel:#EDEFEC;
    --green:#18794B; --greenSoft:#E7F3EC;
    --okText:#157A48; --okFill:#E7F3EC; --okBorder:#BEE0CB;
    --noText:#C0483B; --noFill:#FBEDEA; --noBorder:#F0CFC8;
  }
  *{box-sizing:border-box; font-family:'Plus Jakarta Sans',system-ui,sans-serif;}
  body{margin:0; background:var(--bg); color:var(--ink); -webkit-font-smoothing:antialiased;}
  .wrap{max-width:600px; margin:0 auto; padding:30px 18px 60px;}
  header.top{display:flex; align-items:center; gap:12px; margin-bottom:38px;}
  .logo{width:38px; height:38px; border-radius:11px; background:var(--green); color:#fff; display:flex; align-items:center; justify-content:center; font-weight:800; font-size:20px;}
  .brand{font-weight:800; font-size:20px; letter-spacing:3px; line-height:1;}
  .brand-sub{font-size:11px; color:var(--inkSoft); letter-spacing:1.2px; margin-top:3px; font-weight:600;}
  h1.title{font-size:31px; font-weight:800; letter-spacing:-0.5px; line-height:1.15; margin:0 0 8px;}
  .lead{color:var(--inkSoft); font-size:15px; margin:0; line-height:1.5;}
  .card{display:flex; align-items:center; gap:15px; width:100%; text-align:left; padding:18px; border-radius:16px; border:1.5px solid var(--line); background:var(--card); cursor:pointer; transition:transform .15s, border-color .15s, box-shadow .15s;}
  .card:hover{border-color:var(--green); transform:translateY(-2px); box-shadow:0 6px 18px rgba(24,121,75,.10);}
  .ico{flex-shrink:0; width:46px; height:46px; border-radius:13px; background:var(--greenSoft); display:flex; align-items:center; justify-content:center;}
  .ico svg{stroke:var(--green); fill:none; stroke-width:1.8; stroke-linecap:round; stroke-linejoin:round;}
  .card .t{font-size:17px; font-weight:700;}
  .card .d{font-size:13px; color:var(--inkSoft); margin-top:2px;}
  .arrow{color:var(--inkSoft); font-size:18px;}
  .stack{display:flex; flex-direction:column; gap:12px;}
  .back{background:none; border:none; color:var(--inkSoft); cursor:pointer; font-size:14px; font-weight:600; padding:0; margin-bottom:22px;}
  .h2{font-size:26px; font-weight:800; letter-spacing:-0.3px; margin:0 0 6px;}
  .sub{color:var(--inkSoft); font-size:14px; margin:0 0 26px;}
  .temaBtn{display:flex; align-items:center; gap:13px; width:100%; text-align:left; padding:15px 16px; border-radius:13px; border:1.5px solid var(--line); background:var(--card); cursor:pointer; transition:all .15s;}
  .temaBtn.on{border-color:var(--green); background:var(--greenSoft);}
  .chk{width:22px; height:22px; border-radius:7px; border:2px solid var(--line); display:flex; align-items:center; justify-content:center; color:#fff; font-size:13px; flex-shrink:0;}
  .temaBtn.on .chk{background:var(--green); border-color:var(--green);}
  .temaBtn .name{font-size:16px; font-weight:600;}
  .pill{padding:10px 20px; border-radius:99px; border:1.5px solid var(--line); background:var(--card); color:var(--ink); font-size:15px; font-weight:600; cursor:pointer;}
  .pill.on{border-color:var(--green); background:var(--green); color:#fff;}
  .primary{width:100%; padding:16px; border-radius:14px; border:none; background:var(--green); color:#fff; font-size:16px; font-weight:700; cursor:pointer;}
  .primary:disabled{background:var(--line); cursor:default;}
  .ghost{width:100%; padding:15px; border-radius:14px; border:1.5px solid var(--green); background:transparent; color:var(--green); font-size:16px; font-weight:700; cursor:pointer;}
  .tag{display:inline-block; color:var(--green); font-size:12px; font-weight:700; letter-spacing:.4px; margin-bottom:14px; text-transform:uppercase;}
  .q{font-size:22px; line-height:1.4; font-weight:700; margin:0 0 26px;}
  .opt{width:100%; text-align:left; padding:15px 16px; border-radius:14px; border:1.5px solid var(--line); background:var(--card); color:var(--ink); font-size:16px; font-weight:500; cursor:pointer; transition:all .25s; display:flex; align-items:center; gap:13px;}
  .opt[disabled]{cursor:default;}
  .opt.pending{background:var(--sel); border-color:var(--ink); color:var(--ink);}
  .opt.dim{opacity:.45;}
  .opt.dim55{opacity:.55;}
  .opt.ok{background:var(--okFill); border-color:var(--okBorder); color:var(--okText);}
  .opt.no{background:var(--noFill); border-color:var(--noBorder); color:var(--noText);}
  .badge{flex-shrink:0; width:26px; height:26px; border-radius:8px; background:var(--bg); color:var(--inkSoft); border:1px solid var(--line); display:flex; align-items:center; justify-content:center; font-size:13px; font-weight:700;}
  .opt.pending .badge{background:var(--ink); color:#fff; border-color:var(--ink);}
  .opt.ok .badge{background:var(--green); color:#fff; border-color:var(--green);}
  .opt.no .badge{background:var(--noText); color:#fff; border-color:var(--noText);}
  .feedback{margin-top:24px;}
  .fb-txt{margin:0 0 6px; font-size:15px; font-weight:600;}
  .fb-exp{margin:0 0 16px; font-size:14px; color:var(--inkSoft); line-height:1.5;}
  .ring-wrap{display:flex; justify-content:center; margin-bottom:22px;}
  .meta{display:flex; align-items:center; justify-content:space-between; margin-bottom:24px;}
  .meta .small{font-size:13px; color:var(--inkSoft);}
  .meta .big{font-size:18px; font-weight:700; margin-top:2px;}
  .center{text-align:center;}
  .muted{color:var(--inkSoft); font-size:13px;}
  .empty{padding:40px 18px; text-align:center; color:var(--inkSoft); border:1.5px dashed var(--line); border-radius:16px;}
  @media (prefers-reduced-motion: reduce){*{animation:none!important; transition:none!important;}}
</style>
</head>
<body>
  <div class="wrap">
    <header class="top">
      <span class="logo">K</span>
      <div>
        <div class="brand">KAIZEN</div>
        <div class="brand-sub">POLICÍA MUNICIPAL · MADRID</div>
      </div>
    </header>
    <div id="app"></div>
  </div>

<script>
// ====== CONEXIÓN CON TU ALMACÉN (Supabase) ======
const SUPABASE_URL = "https://bsijdcsruldswsubaieu.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJzaWpkY3NydWxkc3dzdWJhaWV1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI0NTgzMTQsImV4cCI6MjA5ODAzNDMxNH0.dcEx8m8JHTxhLxqqnBJoIibjPMxchORRkJqc4I5UjOg";
const supa = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const LETRAS = ["A","B","C","D"];
const ESPERA = 400;
const ICONS = {
  temario:'<rect x="5" y="3" width="14" height="18" rx="2.5"/><path d="M9 3v2.5h6V3"/><path d="M9 11h6M9 15h4"/>',
  estudio:'<path d="M20 8a8 8 0 0 0-14-3.5M20 4v4h-4"/><path d="M4 16a8 8 0 0 0 14 3.5M4 20v-4h4"/>',
  simulacro:'<circle cx="12" cy="14" r="7"/><path d="M12 14V10M10 2.5h4M18.5 6l-1.3 1.3"/>',
  pagina:'<path d="M7 3h7l4 4v14H7z"/><path d="M14 3v4h4"/><path d="M10 13h5M10 17h5"/>'
};
const svg = (n)=>`<svg width="22" height="22" viewBox="0 0 24 24">${ICONS[n]}</svg>`;
const fmt = (s)=>`${Math.floor(s/60)}:${String(s%60).padStart(2,"0")}`;
const baraja = (a)=>{const x=[...a];for(let i=x.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[x[i],x[j]]=[x[j],x[i]];}return x;};
const esc = (t)=>String(t).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));

function ring(size,progress,width,inner){
  const r=(size-width*2)/2, c=2*Math.PI*r, off=c-c*Math.max(0.02,progress);
  return `<div style="position:relative;width:${size}px;height:${size}px">
    <svg width="${size}" height="${size}" style="transform:rotate(-90deg)">
      <circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="var(--line)" stroke-width="${width}"/>
      <circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="var(--green)" stroke-width="${width}" stroke-linecap="round" stroke-dasharray="${c}" stroke-dashoffset="${off}" style="transition:stroke-dashoffset .55s cubic-bezier(.4,0,.2,1)"/>
    </svg>
    <div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center">${inner}</div>
  </div>`;
}

// ====== ESTADO ======
let TEMAS=[], PREGUNTAS=[];
let vista="inicio", modoConfig="temario", selTemas=new Set(), numPreg=10;
let preguntas=[], titulo="", esSimulacro=false, indice=0, elegida=null, pendiente=null, aciertos=0, segundos=0, timer=null;
let estActual=null, estPool=[], estElegida=null, estPendiente=null, estCount=0;

const app = ()=>document.getElementById("app");
function go(v){ stopTimer(); vista=v; render(); }

function poolDe(set){
  const map=Object.fromEntries(TEMAS.map(t=>[t.id,t.nombre]));
  return PREGUNTAS.filter(p=>set.has(p.tema_id)).map(p=>({...p, tema:map[p.tema_id]}));
}
function todas(){
  const map=Object.fromEntries(TEMAS.map(t=>[t.id,t.nombre]));
  return PREGUNTAS.map(p=>({...p, tema:map[p.tema_id]}));
}

function startTimer(){
  stopTimer();
  timer=setInterval(()=>{ segundos++; const e=document.getElementById("cron"); if(e) e.textContent="⏱ "+fmt(segundos); else stopTimer(); },1000);
}
function stopTimer(){ if(timer){clearInterval(timer); timer=null;} }

// ====== ACCIONES ======
function abrirConfig(m){ modoConfig=m; selTemas=new Set(TEMAS.map(t=>t.id)); go("config"); }
function comenzarTemario(){
  const pool=baraja(poolDe(selTemas));
  const n = numPreg==="todas" ? pool.length : Math.min(numPreg,pool.length);
  preguntas=pool.slice(0,n); titulo="Test de temario"; esSimulacro=false;
  indice=0; elegida=null; pendiente=null; aciertos=0; segundos=0; go("test");
}
function comenzarSimulacro(){
  preguntas=baraja(todas()); titulo="Simulacro"; esSimulacro=true;
  indice=0; elegida=null; pendiente=null; aciertos=0; segundos=0; go("test"); startTimer();
}
function comenzarEstudio(){
  estPool=poolDe(selTemas); estCount=0; estElegida=null; estPendiente=null;
  estActual=estPool[Math.floor(Math.random()*estPool.length)]; go("estudio");
}
function siguienteEstudio(){
  let n=estPool[Math.floor(Math.random()*estPool.length)];
  if(estPool.length>1){ while(n===estActual) n=estPool[Math.floor(Math.random()*estPool.length)]; }
  estActual=n; estElegida=null; estPendiente=null; estCount++; render();
}
function elegir(i){
  if(elegida!==null||pendiente!==null) return;
  pendiente=i; render();
  setTimeout(()=>{ elegida=i; if(i===preguntas[indice].correcta) aciertos++; pendiente=null; render(); }, ESPERA);
}
function siguiente(){
  if(indice+1<preguntas.length){ indice++; elegida=null; pendiente=null; render(); }
  else go("resultados");
}
function elegirEstudio(i){
  if(estElegida!==null||estPendiente!==null) return;
  estPendiente=i; render();
  setTimeout(()=>{ estElegida=i; estPendiente=null; render(); }, ESPERA);
}

// ====== RENDER ======
function optionHTML(texto,i,correcta,elegidaI,fase){
  let cls="opt", check="";
  if(fase==="pending"){ if(i===elegidaI) cls+=" pending"; else cls+=" dim55"; }
  else if(fase==="reveal"){
    if(i===correcta){ cls+=" ok"; check="✓"; }
    else if(i===elegidaI){ cls+=" no"; }
    else cls+=" dim";
  }
  const dis = fase!=="idle" ? "disabled" : "";
  return `<button class="${cls}" ${dis} data-opt="${i}"><span class="badge">${LETRAS[i]}</span><span style="flex:1">${esc(texto)}</span><span>${check}</span></button>`;
}

function render(){
  const A=app();

  if(vista==="cargando"){ A.innerHTML=`<div class="empty">Cargando KAIZEN…</div>`; return; }
  if(vista==="error"){ A.innerHTML=`<div class="empty">No se pudo conectar con la base de datos.<br>Revisa la conexión e inténtalo de nuevo.</div>`; return; }

  if(vista==="inicio"){
    const items=[
      {ic:"temario",t:"Test de temario",d:"Elige temas y nº de preguntas",a:"cfg-temario"},
      {ic:"estudio",t:"Estudio",d:"Elige una respuesta y comprueba al momento, sin límite",a:"cfg-estudio"},
      {ic:"simulacro",t:"Simulacro",d:"Examen completo cronometrado",a:"simulacro"},
      {ic:"pagina",t:"Una página",d:"Resúmenes en PDF de lo más preguntable",a:"unapagina"},
    ];
    A.innerHTML=`
      <div style="margin-bottom:34px">
        <h1 class="title">Mejora cada día.</h1>
        <p class="lead">Tu plaza se construye paso a paso. Elige por dónde seguir hoy.</p>
      </div>
      <div class="stack">
        ${items.map(it=>`<button class="card" data-go="${it.a}">
          <span class="ico">${svg(it.ic)}</span>
          <span style="flex:1"><span class="t" style="display:block">${it.t}</span><span class="d" style="display:block">${it.d}</span></span>
          <span class="arrow">→</span></button>`).join("")}
      </div>`;
    A.querySelectorAll("[data-go]").forEach(b=>b.onclick=()=>{
      const a=b.dataset.go;
      if(a==="cfg-temario") abrirConfig("temario");
      else if(a==="cfg-estudio") abrirConfig("estudio");
      else if(a==="simulacro") comenzarSimulacro();
      else if(a==="unapagina") go("unapagina");
    });
    return;
  }

  if(vista==="config"){
    A.innerHTML=`
      <button class="back" data-back>← Volver</button>
      <h2 class="h2">${modoConfig==="temario"?"Test de temario":"Estudio"}</h2>
      <p class="sub">Selecciona los temas que quieres incluir.</p>
      <div class="stack" style="margin-bottom:28px">
        ${TEMAS.map(t=>`<button class="temaBtn ${selTemas.has(t.id)?'on':''}" data-tema="${t.id}">
          <span class="chk">${selTemas.has(t.id)?'✓':''}</span><span class="name">${esc(t.nombre)}</span></button>`).join("")}
      </div>
      ${modoConfig==="temario"?`
      <div style="margin-bottom:28px">
        <div style="font-size:13px;font-weight:700;color:var(--inkSoft);margin-bottom:11px;letter-spacing:.3px">NÚMERO DE PREGUNTAS</div>
        <div style="display:flex;gap:9px;flex-wrap:wrap">
          ${[5,10,20,"todas"].map(n=>`<button class="pill ${numPreg===n?'on':''}" data-num="${n}">${n==="todas"?"Todas":n}</button>`).join("")}
        </div>
      </div>`:""}
      <button class="primary" data-start ${selTemas.size===0?"disabled":""}>${modoConfig==="temario"?"Comenzar test":"Empezar a estudiar"}</button>`;
    A.querySelector("[data-back]").onclick=()=>go("inicio");
    A.querySelectorAll("[data-tema]").forEach(b=>b.onclick=()=>{
      const id=Number(b.dataset.tema);
      selTemas.has(id)?selTemas.delete(id):selTemas.add(id); render();
    });
    A.querySelectorAll("[data-num]").forEach(b=>b.onclick=()=>{ const v=b.dataset.num; numPreg=v==="todas"?"todas":Number(v); render(); });
    const start=A.querySelector("[data-start]");
    if(start) start.onclick=()=> modoConfig==="temario"?comenzarTemario():comenzarEstudio();
    return;
  }

  if(vista==="test"){
    const actual=preguntas[indice]; const locked=elegida!==null;
    const fase = elegida!==null?"reveal":(pendiente!==null?"pending":"idle");
    const elegidaI = pendiente!==null?pendiente:elegida;
    const prog=(locked?indice+1:indice)/preguntas.length;
    A.innerHTML=`
      <div class="meta">
        <div>
          <div class="small">Pregunta ${indice+1} de ${preguntas.length}</div>
          <div class="big" id="cron">${esSimulacro?("⏱ "+fmt(segundos)):(aciertos+" "+(aciertos===1?"acierto":"aciertos"))}</div>
        </div>
        ${ring(58,prog,5,`<span style="font-size:13px;font-weight:700;color:var(--green)">${Math.round(prog*100)}%</span>`)}
      </div>
      <span class="tag">${esc(actual.tema||titulo)}</span>
      <h1 class="q">${esc(actual.enunciado)}</h1>
      <div class="stack">
        ${[actual.opcion_a,actual.opcion_b,actual.opcion_c,actual.opcion_d].map((op,i)=>optionHTML(op,i,actual.correcta,elegidaI,fase)).join("")}
      </div>
      ${locked?`<div class="feedback">
        <p class="fb-txt" style="color:${elegida===actual.correcta?'var(--okText)':'var(--noText)'}">${elegida===actual.correcta?"Correcto. Bien hecho.":"No es correcta. La buena está en verde."}</p>
        ${actual.explicacion?`<p class="fb-exp">${esc(actual.explicacion)}</p>`:""}
        <button class="primary" data-next>${indice+1<preguntas.length?"Siguiente":"Ver resultados"}</button>
      </div>`:""}`;
    A.querySelectorAll("[data-opt]").forEach(b=>b.onclick=()=>elegir(Number(b.dataset.opt)));
    const nx=A.querySelector("[data-next]"); if(nx) nx.onclick=siguiente;
    return;
  }

  if(vista==="estudio"){
    const a=estActual; const revelado=estElegida!==null;
    const fase = estElegida!==null?"reveal":(estPendiente!==null?"pending":"idle");
    const elegidaI = estPendiente!==null?estPendiente:estElegida;
    A.innerHTML=`
      <button class="back" data-back>← Volver</button>
      <div style="display:flex;justify-content:space-between;font-size:13px;color:var(--inkSoft);margin-bottom:18px">
        <span>Modo estudio · repaso</span><span>${estCount} repasadas</span>
      </div>
      <span class="tag">${esc(a.tema)}</span>
      <h1 class="q">${esc(a.enunciado)}</h1>
      <div class="stack">
        ${[a.opcion_a,a.opcion_b,a.opcion_c,a.opcion_d].map((op,i)=>optionHTML(op,i,a.correcta,elegidaI,fase)).join("")}
      </div>
      ${revelado?`<div class="feedback">
        <p class="fb-txt" style="color:${estElegida===a.correcta?'var(--okText)':'var(--noText)'}">${estElegida===a.correcta?"Correcto. Bien hecho.":"No es correcta. La buena está en verde."}</p>
        ${a.explicacion?`<p class="fb-exp">${esc(a.explicacion)}</p>`:""}
        <button class="primary" data-nextest>Siguiente pregunta</button>
      </div>`:""}`;
    A.querySelector("[data-back]").onclick=()=>go("inicio");
    A.querySelectorAll("[data-opt]").forEach(b=>b.onclick=()=>elegirEstudio(Number(b.dataset.opt)));
    const ne=A.querySelector("[data-nextest]"); if(ne) ne.onclick=siguienteEstudio;
    return;
  }

  if(vista==="unapagina"){
    A.innerHTML=`
      <button class="back" data-back>← Volver</button>
      <h2 class="h2">Una página</h2>
      <p class="sub">Lo más preguntable, resumido en una sola hoja. Descárgalo como apoyo de estudio.</p>
      <div class="empty">Aún no hay fichas. Pronto podrás subir aquí tus resúmenes en PDF desde el panel.</div>`;
    A.querySelector("[data-back]").onclick=()=>go("inicio");
    return;
  }

  if(vista==="resultados"){
    A.innerHTML=`
      <div class="center" style="padding-top:16px">
        <div class="muted" style="margin-bottom:24px">${esc(titulo)} · completado</div>
        <div class="ring-wrap">${ring(150,aciertos/preguntas.length,7,`<div style="font-size:40px;font-weight:800;line-height:1">${aciertos}<span style="color:var(--inkSoft);font-size:20px">/${preguntas.length}</span></div>`)}</div>
        ${esSimulacro?`<div class="muted" style="font-size:15px;margin-bottom:6px">Tiempo: ${fmt(segundos)}</div>`:""}
        <p style="font-size:18px;font-weight:600;margin:10px 0 32px">${aciertos===preguntas.length?"¡Perfecto! Todas correctas.":aciertos>=preguntas.length/2?"Un paso más cerca de tu plaza.":"Cada repaso suma. Sigue."}</p>
        <button class="ghost" style="width:auto;padding:14px 30px;border-color:var(--line);color:var(--ink)" data-home>Volver al inicio</button>
      </div>`;
    A.querySelector("[data-home]").onclick=()=>go("inicio");
    return;
  }
}

// ====== ARRANQUE: traer datos del almacén ======
async function init(){
  vista="cargando"; render();
  try{
    const [t,p] = await Promise.all([
      supa.from("temas").select("*").order("id"),
      supa.from("preguntas").select("*")
    ]);
    if(t.error||p.error) throw (t.error||p.error);
    TEMAS = t.data||[];
    PREGUNTAS = p.data||[];
    selTemas = new Set(TEMAS.map(x=>x.id));
    go("inicio");
  }catch(e){
    console.error(e);
    vista="error"; render();
  }
}
init();
</script>
</body>
</html>
